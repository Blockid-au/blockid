# BlockID production stack.
#
# Three services on a private bridge network:
#   - `web`   : Next.js 16 standalone server (no host ports — only Caddy talks to it).
#   - `caddy` : TLS-terminating reverse proxy on host :80 / :443 with Let's Encrypt.
#   - `cron`  : Lightweight Alpine cron calling /api/cron/* endpoints on schedule.
#
# Bring up:   docker compose up -d
# Tail logs:  docker compose logs -f caddy web

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_GSC_VERIFICATION: ${NEXT_PUBLIC_GSC_VERIFICATION:-}
    image: blockid/web:latest
    container_name: blockid-web
    restart: unless-stopped
    # ── Runtime env vars ──
    # Primary source: .env file on disk (contains ALL 60+ secrets).
    # The `environment:` block below only sets infrastructure defaults
    # that are always the same regardless of .env content.
    env_file:
      - path: .env
        required: true
    environment:
      # Infrastructure defaults (override .env if present)
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      OLLAMA_ENABLED: "true"
      OLLAMA_HOST: "http://172.19.0.1:11434"
      OLLAMA_MODEL: "qwen2.5:3b"
    expose:
      - "3000"
    networks:
      - blockid-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: blockid-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    environment:
      # Caddy auto-agrees to the ACME ToS, but we expose the variable
      # for parity with other tooling that expects it.
      ACME_AGREE: "true"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - blockid-net

  cron:
    build:
      context: ./infra
      dockerfile: Dockerfile.cron
    container_name: blockid-cron
    restart: unless-stopped
    depends_on:
      - web
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    networks:
      - blockid-net

networks:
  blockid-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
