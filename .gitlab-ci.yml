stages:
  - lint
  - build
  - deploy

variables:
  PROJECT_NAME: blockid

# ═══════════════════════════════════════════════════════════════════════
# LINT — runs on all environment branches
# ═══════════════════════════════════════════════════════════════════════

lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - cd web
    - npm ci --prefer-offline
  script:
    - npm run lint
  allow_failure: true
  only:
    - dev
    - staging
    - master

# ═══════════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════════

.build_template: &build_template
  stage: build
  tags:
    - deploy
  script:
    - cd web
    # --no-cache on builder stage ensures NEXT_PUBLIC_* vars are always fresh
    - docker build
        --no-cache
        --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}"
        --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
        --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${NEXT_PUBLIC_GA_MEASUREMENT_ID}"
        --build-arg NEXT_PUBLIC_GTM_ID="${NEXT_PUBLIC_GTM_ID}"
        --build-arg NEXT_PUBLIC_GSC_VERIFICATION="${NEXT_PUBLIC_GSC_VERIFICATION}"
        -t gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG} .

build:dev:
  <<: *build_template
  variables:
    CI_ENV_TAG: dev
  only:
    - dev

build:staging:
  <<: *build_template
  variables:
    CI_ENV_TAG: staging
  only:
    - staging

build:production:
  <<: *build_template
  variables:
    CI_ENV_TAG: latest
  only:
    - master

# ═══════════════════════════════════════════════════════════════════════
# DEPLOY
#
# Strategy: Generate .env.deploy file from GitLab CI Variables, then
# pass it to docker via --env-file. This ensures ALL vars are included
# automatically — no more forgetting individual -e flags.
#
# Adding a new env var:
#   1. Add to web/.env (local dev)
#   2. Add to GitLab CI Variables (Settings → CI/CD → Variables)
#   3. Done — deploy will pick it up automatically
# ═══════════════════════════════════════════════════════════════════════

.deploy_template: &deploy_template
  stage: deploy
  tags:
    - deploy
  script:
    # ── 1. Validate critical CI variables ──
    - |
      MISSING=""
      [ -z "${SUPABASE_URL}" ] && MISSING="$MISSING SUPABASE_URL"
      [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ] && MISSING="$MISSING SUPABASE_SERVICE_ROLE_KEY"
      [ -z "${ANTHROPIC_API_KEY}" ] && MISSING="$MISSING ANTHROPIC_API_KEY"
      [ -z "${CRON_SECRET}" ] && MISSING="$MISSING CRON_SECRET"
      [ -z "${STRIPE_SECRET_KEY}" ] && MISSING="$MISSING STRIPE_SECRET_KEY"
      if [ -n "$MISSING" ]; then
        echo "CRITICAL: Missing GitLab CI Variables:$MISSING"
        echo "Add them in GitLab → Settings → CI/CD → Variables"
        exit 1
      fi
      echo "✓ All critical env vars validated"

    # ── 2. Stop old container ──
    - docker stop deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker stop deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true

    # ── 3. Start container (all env vars via -e flags) ──
    - docker run -d
        --name deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
        --restart unless-stopped
        --network supabase_default
        -p 127.0.0.1:${DEPLOY_PORT}:3000
        -e NODE_ENV=${NODE_ENV}
        -e PORT=3000
        -e HOSTNAME=0.0.0.0
        -e SUPABASE_URL=${SUPABASE_URL}
        -e SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        -e NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        -e ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
        -e IP_HASH_SALT=${IP_HASH_SALT}
        -e SMTP_HOST=${SMTP_HOST}
        -e SMTP_PORT=${SMTP_PORT}
        -e SMTP_USER=${SMTP_USER}
        -e SMTP_PASS=${SMTP_PASS}
        -e "SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}"
        -e GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        -e GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
        -e GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL}
        -e "GOOGLE_DRIVE_PRIVATE_KEY=${GOOGLE_DRIVE_PRIVATE_KEY}"
        -e GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
        -e CRON_SECRET=${CRON_SECRET}
        -e STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
        -e STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
        -e STRIPE_PRICE_FOUNDING50=${STRIPE_PRICE_FOUNDING50}
        -e STRIPE_PRICE_FOUNDER=${STRIPE_PRICE_FOUNDER}
        -e STRIPE_PRICE_GROWTH=${STRIPE_PRICE_GROWTH}
        -e STRIPE_PRICE_GROWTH_ANNUAL=${STRIPE_PRICE_GROWTH_ANNUAL}
        -e STRIPE_PRICE_GROWTH_499=${STRIPE_PRICE_GROWTH_499}
        -e STRIPE_PRICE_PILOT=${STRIPE_PRICE_PILOT}
        -e STRIPE_PRICE_ACCELERATOR=${STRIPE_PRICE_ACCELERATOR}
        -e STRIPE_PRICE_CREDITS_5=${STRIPE_PRICE_CREDITS_5}
        -e STRIPE_PRICE_CREDITS_10=${STRIPE_PRICE_CREDITS_10}
        -e STRIPE_PRICE_CREDITS_25=${STRIPE_PRICE_CREDITS_25}
        -e STRIPE_PRICE_CREDITS_50=${STRIPE_PRICE_CREDITS_50}
        -e STRIPE_PRICE_CREDITS_100=${STRIPE_PRICE_CREDITS_100}
        -e STRIPE_PRICE_SVI_ANALYSIS=${STRIPE_PRICE_SVI_ANALYSIS}
        -e STRIPE_PRICE_SVI_ANALYSIS_25=${STRIPE_PRICE_SVI_ANALYSIS_25}
        -e GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
        -e GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
        -e LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
        -e LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
        -e GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
        -e OPENAI_API_KEY=${OPENAI_API_KEY}
        -e ANTHROPIC_PROXY_BASE_URL=${ANTHROPIC_PROXY_BASE_URL}
        -e ANTHROPIC_PROXY_API_KEY=${ANTHROPIC_PROXY_API_KEY}
        -e RESEND_API_KEY=${RESEND_API_KEY}
        -e "RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}"
        -e OLLAMA_ENABLED=true
        -e OLLAMA_HOST=http://172.19.0.1:11434
        -e OLLAMA_MODEL=qwen2.5:3b
        -e COSMOS_CHAIN_ID=${COSMOS_CHAIN_ID}
        -e COSMOS_REST_URL=${COSMOS_REST_URL}
        -e COSMOS_RPC_URL=${COSMOS_RPC_URL}
        -e AI_GATEWAY_URL=${AI_GATEWAY_URL:-}
        -e AI_GATEWAY_SECRET=${AI_GATEWAY_SECRET:-}
        -e BILLING_URL=${BILLING_URL:-}
        -e BILLING_SECRET=${BILLING_SECRET:-}
        -v /home/dovanlong/.claude/.credentials.json:/home/node/.claude/.credentials.json:ro
        -v /home/dovanlong/.codex/auth.json:/home/node/.codex/auth.json:ro
        -v ${CONTENT_DIR}:/app/content
        -v /home/dovanlong/blockid.au/uploads:/app/uploads
        gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG}

    # ── 4. Wait for healthy ──
    - echo "Waiting for container to be healthy..."
    - |
      for i in $(seq 1 30); do
        STATUS=$(docker inspect --format="{{.State.Health.Status}}" deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || echo "starting")
        if [ "$STATUS" = "healthy" ]; then
          echo "Container is healthy!"
          break
        fi
        echo "  [$i/30] Status: $STATUS"
        sleep 2
      done

    # ── 5. Verify deployment ──
    - docker ps | grep deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
    - echo "Deployed to ${DEPLOY_URL}"
    - curl -sf http://127.0.0.1:${DEPLOY_PORT}/ -o /dev/null && echo "Health check passed!" || echo "Warning - health check pending"

    # ── 6. Count env vars in container (sanity check) ──
    - |
      ENV_COUNT=$(docker inspect deploy-${PROJECT_NAME}-${CI_ENV_SLUG} --format='{{range .Config.Env}}1{{end}}' | wc -c)
      echo "Container has $ENV_COUNT env vars"
      if [ "$ENV_COUNT" -lt 30 ]; then
        echo "WARNING: Container has fewer than 30 env vars — check GitLab CI Variables"
      fi


# ── Dev ───────────────────────────────────────────────────────────────
# Directory: /home/dovanlong/dev.blockid.au (branch: dev)
# URL: https://dev.blockid.au → port 4003
deploy:dev:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: dev
    CI_ENV_TAG: dev
    DEPLOY_PORT: "4003"
    NODE_ENV: development
    DEPLOY_URL: https://dev.blockid.au
    CONTENT_DIR: /home/dovanlong/dev.blockid.au/web/content
  environment:
    name: dev
    url: https://dev.blockid.au
  only:
    - dev

# ── Staging ───────────────────────────────────────────────────────────
# Directory: /home/dovanlong/staging.blockid.au (branch: staging)
# URL: https://staging.blockid.au → port 4002
# Must pass all tests before promoting to production.
deploy:staging:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: staging
    CI_ENV_TAG: staging
    DEPLOY_PORT: "4002"
    NODE_ENV: production
    DEPLOY_URL: https://staging.blockid.au
    CONTENT_DIR: /home/dovanlong/staging.blockid.au/web/content
  environment:
    name: staging
    url: https://staging.blockid.au
  only:
    - staging

# ── Production ────────────────────────────────────────────────────────
# Directory: /home/dovanlong/blockid.au (branch: master)
# URL: https://blockid.au → port 4001
# Only deploys after staging is verified.
deploy:production:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: production
    CI_ENV_TAG: latest
    DEPLOY_PORT: "4001"
    NODE_ENV: production
    DEPLOY_URL: https://blockid.au
    CONTENT_DIR: /home/dovanlong/blockid.au/web/content
  environment:
    name: production
    url: https://blockid.au
  only:
    - master

