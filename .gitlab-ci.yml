stages:
  - lint
  - build
  - deploy

variables:
  PROJECT_NAME: blockid

# ═══════════════════════════════════════════════════════════════════════
# LINT — runs on all environment branches
# ═══════════════════════════════════════════════════════════════════════

lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - cd web
    - npm ci --prefer-offline
  script:
    - npm run lint
  allow_failure: true
  only:
    - dev
    - staging
    - master

# ═══════════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════════

.build_template: &build_template
  stage: build
  tags:
    - deploy
  script:
    - cd web
    - docker build
        --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}"
        --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
        --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${NEXT_PUBLIC_GA_MEASUREMENT_ID}"
        --build-arg NEXT_PUBLIC_GTM_ID="${NEXT_PUBLIC_GTM_ID}"
        --build-arg NEXT_PUBLIC_GSC_VERIFICATION="${NEXT_PUBLIC_GSC_VERIFICATION}"
        -t gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG} .

build:dev:
  <<: *build_template
  variables:
    CI_ENV_TAG: dev
  only:
    - dev

build:staging:
  <<: *build_template
  variables:
    CI_ENV_TAG: staging
  only:
    - staging

build:production:
  <<: *build_template
  variables:
    CI_ENV_TAG: latest
  only:
    - master

# ═══════════════════════════════════════════════════════════════════════
# DEPLOY
#
# Strategy: Generate .env.deploy file from GitLab CI Variables, then
# pass it to docker via --env-file. This ensures ALL vars are included
# automatically — no more forgetting individual -e flags.
#
# Adding a new env var:
#   1. Add to web/.env (local dev)
#   2. Add to GitLab CI Variables (Settings → CI/CD → Variables)
#   3. Done — deploy will pick it up automatically
# ═══════════════════════════════════════════════════════════════════════

.deploy_template: &deploy_template
  stage: deploy
  tags:
    - deploy
  script:
    # ── 1. Generate .env.deploy from CI variables ──
    # This replaces 40+ individual -e flags with a single --env-file
    - |
      ENV_FILE="/tmp/blockid-${CI_ENV_SLUG}.env"
      cat > "$ENV_FILE" <<ENVEOF
      NODE_ENV=${NODE_ENV}
      PORT=3000
      HOSTNAME=0.0.0.0
      SUPABASE_URL=${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      IP_HASH_SALT=${IP_HASH_SALT}
      SMTP_HOST=${SMTP_HOST}
      SMTP_PORT=${SMTP_PORT}
      SMTP_USER=${SMTP_USER}
      SMTP_PASS=${SMTP_PASS}
      SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_DRIVE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_DRIVE_PRIVATE_KEY=${GOOGLE_DRIVE_PRIVATE_KEY}
      GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      CRON_SECRET=${CRON_SECRET}
      STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_FOUNDING50=${STRIPE_PRICE_FOUNDING50}
      STRIPE_PRICE_FOUNDER=${STRIPE_PRICE_FOUNDER}
      STRIPE_PRICE_GROWTH=${STRIPE_PRICE_GROWTH}
      STRIPE_PRICE_GROWTH_499=${STRIPE_PRICE_GROWTH_499}
      STRIPE_PRICE_PILOT=${STRIPE_PRICE_PILOT}
      STRIPE_PRICE_ACCELERATOR=${STRIPE_PRICE_ACCELERATOR}
      STRIPE_PRICE_CREDITS_5=${STRIPE_PRICE_CREDITS_5}
      STRIPE_PRICE_CREDITS_10=${STRIPE_PRICE_CREDITS_10}
      STRIPE_PRICE_CREDITS_25=${STRIPE_PRICE_CREDITS_25}
      STRIPE_PRICE_CREDITS_50=${STRIPE_PRICE_CREDITS_50}
      STRIPE_PRICE_CREDITS_100=${STRIPE_PRICE_CREDITS_100}
      STRIPE_PRICE_SVI_ANALYSIS=${STRIPE_PRICE_SVI_ANALYSIS}
      STRIPE_PRICE_SVI_ANALYSIS_25=${STRIPE_PRICE_SVI_ANALYSIS_25}
      GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET}
      GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
      OPENAI_API_KEY=${OPENAI_API_KEY}
      ANTHROPIC_PROXY_BASE_URL=${ANTHROPIC_PROXY_BASE_URL}
      ANTHROPIC_PROXY_API_KEY=${ANTHROPIC_PROXY_API_KEY}
      RESEND_API_KEY=${RESEND_API_KEY}
      RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      COSMOS_CHAIN_ID=${COSMOS_CHAIN_ID}
      COSMOS_REST_URL=${COSMOS_REST_URL}
      COSMOS_RPC_URL=${COSMOS_RPC_URL}
      ENVEOF
      # Remove leading whitespace from heredoc
      sed -i 's/^[[:space:]]*//' "$ENV_FILE"
      # Remove empty lines and lines with empty values
      sed -i '/^$/d' "$ENV_FILE"
      echo "Generated $ENV_FILE with $(wc -l < "$ENV_FILE") variables"

    # ── 2. Validate critical variables ──
    - |
      CRITICAL_VARS="SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY CRON_SECRET STRIPE_SECRET_KEY"
      MISSING=""
      for var in $CRITICAL_VARS; do
        if ! grep -q "^${var}=.\+" "/tmp/blockid-${CI_ENV_SLUG}.env"; then
          MISSING="$MISSING $var"
        fi
      done
      if [ -n "$MISSING" ]; then
        echo "CRITICAL: Missing env vars:$MISSING"
        echo "Add them in GitLab → Settings → CI/CD → Variables"
        exit 1
      fi
      echo "✓ All critical env vars validated"

    # ── 3. Stop old container ──
    - docker stop deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker stop deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true

    # ── 4. Start new container with --env-file ──
    - docker run -d
        --name deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
        --restart unless-stopped
        --network supabase_default
        -p 127.0.0.1:${DEPLOY_PORT}:3000
        --env-file /tmp/blockid-${CI_ENV_SLUG}.env
        -v /home/dovanlong/.claude/.credentials.json:/home/node/.claude/.credentials.json:ro
        -v /home/dovanlong/.codex/auth.json:/home/node/.codex/auth.json:ro
        -v /home/dovanlong/blockid.au/web/content:/app/content
        gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG}

    # ── 5. Wait for healthy ──
    - echo "Waiting for container to be healthy..."
    - |
      for i in $(seq 1 30); do
        STATUS=$(docker inspect --format="{{.State.Health.Status}}" deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || echo "starting")
        if [ "$STATUS" = "healthy" ]; then
          echo "Container is healthy!"
          break
        fi
        echo "  [$i/30] Status: $STATUS"
        sleep 2
      done

    # ── 6. Verify deployment ──
    - docker ps | grep deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
    - echo "Deployed to ${DEPLOY_URL}"
    - curl -sf http://127.0.0.1:${DEPLOY_PORT}/ -o /dev/null && echo "Health check passed!" || echo "Warning - health check pending"

    # ── 7. Count env vars in container (sanity check) ──
    - |
      ENV_COUNT=$(docker inspect deploy-${PROJECT_NAME}-${CI_ENV_SLUG} --format='{{range .Config.Env}}1{{end}}' | wc -c)
      echo "Container has $ENV_COUNT env vars"
      if [ "$ENV_COUNT" -lt 30 ]; then
        echo "WARNING: Container has fewer than 30 env vars — check GitLab CI Variables"
      fi

    # ── 8. Cleanup temp env file ──
    - rm -f /tmp/blockid-${CI_ENV_SLUG}.env

# ── Dev ───────────────────────────────────────────────────────────────
deploy:dev:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: dev
    CI_ENV_TAG: dev
    DEPLOY_PORT: "4003"
    NODE_ENV: development
    DEPLOY_URL: https://dev.blockid.au
  environment:
    name: dev
    url: https://dev.blockid.au
  only:
    - dev

# ── Staging ───────────────────────────────────────────────────────────
deploy:staging:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: staging
    CI_ENV_TAG: staging
    DEPLOY_PORT: "4002"
    NODE_ENV: production
    DEPLOY_URL: https://staging.blockid.au
  environment:
    name: staging
    url: https://staging.blockid.au
  only:
    - staging

# ── Production ────────────────────────────────────────────────────────
deploy:production:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: production
    CI_ENV_TAG: latest
    DEPLOY_PORT: "4001"
    NODE_ENV: production
    DEPLOY_URL: https://blockid.au
  environment:
    name: production
    url: https://blockid.au
  only:
    - master
