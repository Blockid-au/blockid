stages:
  - deploy

variables:
  PROJECT_NAME: blockid

# ═══════════════════════════════════════════════════════════════════════
# DEPLOY — single-stage: lint → build → deploy in one job
#
# Why single stage?
#   - Eliminates inter-stage overhead (container spinup, artifact transfer)
#   - lint + build + deploy in ~90s instead of 10+ minutes
#   - Uses Docker layer cache (no --no-cache) — ARG declarations in
#     Dockerfile handle NEXT_PUBLIC_* inlining correctly
#   - Reads .env from disk for both build-time inlining and runtime
#
# Adding a new env var:
#   1. Add to web/.env on the server
#   2. Done — build picks it up via COPY, runtime via --env-file
# ═══════════════════════════════════════════════════════════════════════

.deploy_template: &deploy_template
  stage: deploy
  tags:
    - deploy
  script:
    # ── 1. Lint (fast, non-blocking) ──
    - cd web
    - npm run lint --if-present 2>&1 || echo "⚠ Lint warnings (non-blocking)"

    # ── 2. Build Docker image ──
    # Uses layer cache — only rebuilds changed layers.
    # NEXT_PUBLIC_* vars are inlined via two paths:
    #   - .env file on disk (COPY . .) — primary
    #   - --build-arg as fallback (ARG declarations in Dockerfile)
    - echo "=== Building Docker image ==="
    - docker compose build web
    - echo "✓ Build complete"

    # ── 3. Stop old container ──
    - docker rm -f deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true

    # ── 4. Start container ──
    - docker run -d
        --name deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
        --restart unless-stopped
        --network supabase_default
        -p 127.0.0.1:${DEPLOY_PORT}:3000
        --env-file .env
        -v /home/dovanlong/.claude/.credentials.json:/home/node/.claude/.credentials.json:ro
        -v /home/dovanlong/.codex/auth.json:/home/node/.codex/auth.json:ro
        -v ${CONTENT_DIR}:/app/content
        -v /home/dovanlong/blockid.au/uploads:/app/uploads
        blockid/web:latest

    # ── 5. Wait for healthy (max 30s) ──
    - |
      for i in $(seq 1 15); do
        STATUS=$(docker inspect --format="{{.State.Health.Status}}" deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || echo "starting")
        [ "$STATUS" = "healthy" ] && echo "✓ Container healthy" && break
        sleep 2
      done

    # ── 6. Verify ──
    - curl -sf http://127.0.0.1:${DEPLOY_PORT}/ -o /dev/null && echo "✓ Health check passed" || echo "⚠ Health check pending"
    - |
      ENV_COUNT=$(docker exec deploy-${PROJECT_NAME}-${CI_ENV_SLUG} env 2>/dev/null | grep -c "=" || echo "0")
      echo "✓ Container running with $ENV_COUNT env vars"

    # ── 7. Purge Cloudflare cache ──
    - bash scripts/purge-cloudflare-cache.sh 2>/dev/null || true


# ── Dev ───────────────────────────────────────────────────────────────
deploy:dev:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: dev
    CI_ENV_TAG: dev
    DEPLOY_PORT: "4003"
    CONTENT_DIR: /home/dovanlong/dev.blockid.au/web/content
  environment:
    name: dev
    url: https://dev.blockid.au
  only:
    - dev

# ── Staging ───────────────────────────────────────────────────────────
deploy:staging:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: staging
    CI_ENV_TAG: staging
    DEPLOY_PORT: "4002"
    CONTENT_DIR: /home/dovanlong/staging.blockid.au/web/content
  environment:
    name: staging
    url: https://staging.blockid.au
  only:
    - staging

# ── Production ────────────────────────────────────────────────────────
deploy:production:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: production
    CI_ENV_TAG: latest
    DEPLOY_PORT: "4001"
    CONTENT_DIR: /home/dovanlong/blockid.au/web/content
  environment:
    name: production
    url: https://blockid.au
  only:
    - master
