stages:
  - lint
  - build
  - deploy

variables:
  PROJECT_NAME: blockid

# ═══════════════════════════════════════════════════════════════════════
# LINT — runs on all environment branches
# ═══════════════════════════════════════════════════════════════════════

lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - cd web
    - npm ci --prefer-offline
  script:
    - npm run lint
  allow_failure: true
  only:
    - dev
    - staging
    - master

# ═══════════════════════════════════════════════════════════════════════
# BUILD
# ═══════════════════════════════════════════════════════════════════════

.build_template: &build_template
  stage: build
  tags:
    - deploy
  script:
    - cd web
    # --no-cache on builder stage ensures NEXT_PUBLIC_* vars are always fresh
    - docker build
        --no-cache
        --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}"
        --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
        --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${NEXT_PUBLIC_GA_MEASUREMENT_ID}"
        --build-arg NEXT_PUBLIC_GTM_ID="${NEXT_PUBLIC_GTM_ID}"
        --build-arg NEXT_PUBLIC_GSC_VERIFICATION="${NEXT_PUBLIC_GSC_VERIFICATION}"
        -t gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG} .

build:dev:
  <<: *build_template
  variables:
    CI_ENV_TAG: dev
  only:
    - dev

build:staging:
  <<: *build_template
  variables:
    CI_ENV_TAG: staging
  only:
    - staging

build:production:
  <<: *build_template
  variables:
    CI_ENV_TAG: latest
  only:
    - master

# ═══════════════════════════════════════════════════════════════════════
# DEPLOY
#
# Strategy: Generate .env.deploy file from GitLab CI Variables, then
# pass it to docker via --env-file. This ensures ALL vars are included
# automatically — no more forgetting individual -e flags.
#
# Adding a new env var:
#   1. Add to web/.env (local dev)
#   2. Add to GitLab CI Variables (Settings → CI/CD → Variables)
#   3. Done — deploy will pick it up automatically
# ═══════════════════════════════════════════════════════════════════════

.deploy_template: &deploy_template
  stage: deploy
  tags:
    - deploy
  script:
    # ── 1. Validate critical CI variables ──
    - |
      MISSING=""
      WARN=""
      # ── Core infrastructure ──
      [ -z "${SUPABASE_URL}" ] && MISSING="$MISSING SUPABASE_URL"
      [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ] && MISSING="$MISSING SUPABASE_SERVICE_ROLE_KEY"
      [ -z "${ANTHROPIC_API_KEY}" ] && MISSING="$MISSING ANTHROPIC_API_KEY"
      [ -z "${CRON_SECRET}" ] && MISSING="$MISSING CRON_SECRET"
      # ── Stripe (critical — payments will fail without these) ──
      [ -z "${STRIPE_SECRET_KEY}" ] && MISSING="$MISSING STRIPE_SECRET_KEY"
      [ -z "${STRIPE_WEBHOOK_SECRET}" ] && MISSING="$MISSING STRIPE_WEBHOOK_SECRET"
      [ -z "${STRIPE_PRICE_FOUNDING50}" ] && WARN="$WARN STRIPE_PRICE_FOUNDING50"
      [ -z "${STRIPE_PRICE_GROWTH}" ] && WARN="$WARN STRIPE_PRICE_GROWTH"
      # ── Auth (critical — OAuth will fail without these) ──
      [ -z "${GOOGLE_CLIENT_ID}" ] && WARN="$WARN GOOGLE_CLIENT_ID"
      [ -z "${GOOGLE_CLIENT_SECRET}" ] && WARN="$WARN GOOGLE_CLIENT_SECRET"
      # ── Microservice secrets (optional — falls back to local) ──
      [ -z "${AI_GATEWAY_SECRET}" ] && WARN="$WARN AI_GATEWAY_SECRET"
      [ -z "${BILLING_SECRET}" ] && WARN="$WARN BILLING_SECRET"
      if [ -n "$MISSING" ]; then
        echo "═══════════════════════════════════════════════════"
        echo "CRITICAL: Missing GitLab CI Variables:$MISSING"
        echo "═══════════════════════════════════════════════════"
        echo "Add them in GitLab → Settings → CI/CD → Variables"
        echo "Deploy ABORTED to prevent broken production."
        exit 1
      fi
      if [ -n "$WARN" ]; then
        echo "⚠ WARNING: Optional vars not set:$WARN"
        echo "  Some features may not work (Stripe checkout, OAuth, microservices)"
      fi
      # Print env var count as sanity check
      TOTAL_SET=0
      for v in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY STRIPE_SECRET_KEY \
               STRIPE_WEBHOOK_SECRET STRIPE_PRICE_FOUNDING50 STRIPE_PRICE_GROWTH \
               GOOGLE_CLIENT_ID RESEND_API_KEY AI_GATEWAY_URL BILLING_URL; do
        eval "[ -n \"\${$v}\" ]" && TOTAL_SET=$((TOTAL_SET+1))
      done
      echo "✓ Env vars validated: $TOTAL_SET/11 key vars set"

    # ── 2. Stop old container ──
    - docker stop deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker stop deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || true

    # ── 3. Generate runtime env file from .env + CI overrides ──
    # Strategy: use the on-disk .env as the base (60+ vars), then overlay
    # any GitLab CI variables on top. This ensures no env var is ever lost
    # even if the CI variable list is incomplete.
    - |
      ENV_DIR="/home/dovanlong/${CI_ENV_SLUG:-production}.blockid.au/web"
      # Fallback to production dir if env-specific dir doesn't exist
      [ ! -d "$ENV_DIR" ] && ENV_DIR="/home/dovanlong/blockid.au/web"
      ENV_FILE="$ENV_DIR/.env"
      RUNTIME_ENV="/tmp/blockid-${CI_ENV_SLUG:-production}.env"

      if [ -f "$ENV_FILE" ]; then
        # Start from on-disk .env (source of truth for all keys)
        cp "$ENV_FILE" "$RUNTIME_ENV"
        echo "✓ Loaded $(grep -c '=' "$RUNTIME_ENV") vars from $ENV_FILE"
      else
        touch "$RUNTIME_ENV"
        echo "⚠ No .env found at $ENV_FILE — using only CI variables"
      fi

      # Overlay CI variables (these take priority over .env)
      # Only override if CI variable is actually set (non-empty)
      for var in \
        NODE_ENV SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY \
        STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET CRON_SECRET \
        GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET RESEND_API_KEY \
        AI_GATEWAY_URL AI_GATEWAY_SECRET BILLING_URL BILLING_SECRET \
        NEXT_PUBLIC_SITE_URL; do
        eval "val=\${$var:-}"
        if [ -n "$val" ]; then
          # Remove existing line and append new value
          sed -i "/^${var}=/d" "$RUNTIME_ENV"
          echo "${var}=${val}" >> "$RUNTIME_ENV"
        fi
      done

      # Ensure these are always set
      sed -i '/^PORT=/d; /^HOSTNAME=/d; /^OLLAMA_ENABLED=/d; /^OLLAMA_HOST=/d; /^OLLAMA_MODEL=/d' "$RUNTIME_ENV"
      echo "PORT=3000" >> "$RUNTIME_ENV"
      echo "HOSTNAME=0.0.0.0" >> "$RUNTIME_ENV"
      echo "OLLAMA_ENABLED=true" >> "$RUNTIME_ENV"
      echo "OLLAMA_HOST=http://172.19.0.1:11434" >> "$RUNTIME_ENV"
      echo "OLLAMA_MODEL=qwen2.5:3b" >> "$RUNTIME_ENV"

      FINAL_COUNT=$(grep -c '=' "$RUNTIME_ENV")
      echo "✓ Runtime env file ready: $FINAL_COUNT vars → $RUNTIME_ENV"

    # ── 4. Start container with --env-file (all vars from single file) ──
    - docker run -d
        --name deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
        --restart unless-stopped
        --network supabase_default
        -p 127.0.0.1:${DEPLOY_PORT}:3000
        --env-file /tmp/blockid-${CI_ENV_SLUG:-production}.env
        -v /home/dovanlong/.claude/.credentials.json:/home/node/.claude/.credentials.json:ro
        -v /home/dovanlong/.codex/auth.json:/home/node/.codex/auth.json:ro
        -v ${CONTENT_DIR}:/app/content
        -v /home/dovanlong/blockid.au/uploads:/app/uploads
        gitlab-deploy/${PROJECT_NAME}:${CI_ENV_TAG}

    # ── 5. Wait for healthy ──
    - echo "Waiting for container to be healthy..."
    - |
      for i in $(seq 1 30); do
        STATUS=$(docker inspect --format="{{.State.Health.Status}}" deploy-${PROJECT_NAME}-${CI_ENV_SLUG} 2>/dev/null || echo "starting")
        if [ "$STATUS" = "healthy" ]; then
          echo "Container is healthy!"
          break
        fi
        echo "  [$i/30] Status: $STATUS"
        sleep 2
      done

    # ── 6. Verify deployment ──
    - docker ps | grep deploy-${PROJECT_NAME}-${CI_ENV_SLUG}
    - echo "Deployed to ${DEPLOY_URL}"
    - curl -sf http://127.0.0.1:${DEPLOY_PORT}/ -o /dev/null && echo "Health check passed!" || echo "Warning - health check pending"

    # ── 7. Verify env vars in container (sanity check) ──
    - |
      ENV_COUNT=$(docker exec deploy-${PROJECT_NAME}-${CI_ENV_SLUG} env 2>/dev/null | grep -c "=" || echo "0")
      echo "Container has $ENV_COUNT env vars"
      if [ "$ENV_COUNT" -lt 50 ]; then
        echo "⚠ WARNING: Container has fewer than 50 env vars ($ENV_COUNT found)"
        echo "  Expected 60+. Check that .env file exists on the server."
        echo "  Missing vars will cause features to fail silently."
      else
        echo "✓ Env var count looks good ($ENV_COUNT vars)"
      fi
      # Spot-check critical vars inside container
      for v in SUPABASE_URL STRIPE_SECRET_KEY ANTHROPIC_API_KEY CRON_SECRET; do
        VAL=$(docker exec deploy-${PROJECT_NAME}-${CI_ENV_SLUG} sh -c "echo \${$v}" 2>/dev/null)
        if [ -z "$VAL" ]; then
          echo "  CRITICAL: $v is EMPTY inside container!"
        fi
      done


# ── Dev ───────────────────────────────────────────────────────────────
# Directory: /home/dovanlong/dev.blockid.au (branch: dev)
# URL: https://dev.blockid.au → port 4003
deploy:dev:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: dev
    CI_ENV_TAG: dev
    DEPLOY_PORT: "4003"
    NODE_ENV: development
    DEPLOY_URL: https://dev.blockid.au
    CONTENT_DIR: /home/dovanlong/dev.blockid.au/web/content
  environment:
    name: dev
    url: https://dev.blockid.au
  only:
    - dev

# ── Staging ───────────────────────────────────────────────────────────
# Directory: /home/dovanlong/staging.blockid.au (branch: staging)
# URL: https://staging.blockid.au → port 4002
# Must pass all tests before promoting to production.
deploy:staging:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: staging
    CI_ENV_TAG: staging
    DEPLOY_PORT: "4002"
    NODE_ENV: production
    DEPLOY_URL: https://staging.blockid.au
    CONTENT_DIR: /home/dovanlong/staging.blockid.au/web/content
  environment:
    name: staging
    url: https://staging.blockid.au
  only:
    - staging

# ── Production ────────────────────────────────────────────────────────
# Directory: /home/dovanlong/blockid.au (branch: master)
# URL: https://blockid.au → port 4001
# Only deploys after staging is verified.
deploy:production:
  <<: *deploy_template
  variables:
    CI_ENV_SLUG: production
    CI_ENV_TAG: latest
    DEPLOY_PORT: "4001"
    NODE_ENV: production
    DEPLOY_URL: https://blockid.au
    CONTENT_DIR: /home/dovanlong/blockid.au/web/content
  environment:
    name: production
    url: https://blockid.au
  only:
    - master

