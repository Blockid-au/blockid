stages:
  - lint
  - build
  - deploy

variables:
  PROJECT_NAME: blockid
  DEPLOY_PORT: "4001"

lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - cd web
    - npm ci --prefer-offline
  script:
    - npm run lint
  allow_failure: true
  only:
    - master

build:
  stage: build
  tags:
    - deploy
  script:
    - cd web
    - docker build
        --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}"
        --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}"
        -t gitlab-deploy/${PROJECT_NAME}:latest .
  only:
    - master

deploy:
  stage: deploy
  tags:
    - deploy
  script:
    - docker stop deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker rm deploy-${PROJECT_NAME} 2>/dev/null || true
    - docker run -d
        --name deploy-${PROJECT_NAME}
        --restart unless-stopped
        --network supabase_default
        -p 127.0.0.1:${DEPLOY_PORT}:3000
        -e NODE_ENV=production
        -e PORT=3000
        -e HOSTNAME=0.0.0.0
        -e SUPABASE_URL=${SUPABASE_URL}
        -e SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        -e NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        -e ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
        -e IP_HASH_SALT=${IP_HASH_SALT}
        -e "RESEND_FROM_EMAIL=BlockID <noreply@blockid.au>"
        gitlab-deploy/${PROJECT_NAME}:latest
    - echo "Waiting for container to be healthy..."
    - |
      for i in $(seq 1 30); do
        STATUS=$(docker inspect --format="{{.State.Health.Status}}" deploy-${PROJECT_NAME} 2>/dev/null || echo "starting")
        if [ "$STATUS" = "healthy" ]; then
          echo "Container is healthy!"
          break
        fi
        echo "  [$i/30] Status: $STATUS"
        sleep 2
      done
    - docker ps | grep deploy-${PROJECT_NAME}
    - echo "Deployed to https://blockid.git.longcare.au"
    - curl -sf http://127.0.0.1:${DEPLOY_PORT}/ -o /dev/null && echo "Health check passed!" || echo "Warning - health check pending"
  environment:
    name: production
    url: https://blockid.git.longcare.au
  only:
    - master
